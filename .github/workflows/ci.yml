name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    uses: ./.github/workflows/reusable-security.yml

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: validate the observability compose file
        run: docker compose -f compose/docker-compose.yml config >/dev/null && echo "compose OK"
