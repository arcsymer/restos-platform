global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # restos-core exposes Micrometer/Actuator Prometheus metrics directly
  - job_name: restos-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["restos-core:8080"]

  # the OTel Collector re-exports the same app metrics after processing —
  # proves the collector hop (core -> otel-collector -> prometheus) is live
  - job_name: otel-collector-export
    static_configs:
      - targets: ["otel-collector:8889"]

  # the collector's own internal telemetry
  - job_name: otel-collector-self
    static_configs:
      - targets: ["otel-collector:8888"]

  # Redpanda broker metrics (streaming profile; down until `--profile streaming`)
  - job_name: redpanda
    metrics_path: /public_metrics
    static_configs:
      - targets: ["redpanda:9644"]
