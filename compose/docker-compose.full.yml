# Full RestOS ecosystem — ONE command stands up the whole local stack.
#
#   docker compose -f compose/docker-compose.full.yml up --build
#
# Assumes every RestOS repo is checked out as a sibling of restos-platform
# (the layout on the operator's machine: D:\dev\portfolio\restos-*). Build
# contexts below reach up two levels (compose/ -> restos-platform/ -> portfolio/).
#
# Honest scope: a LOCAL developer stack on SYNTHETIC data. No production, no real
# users. Postgres backs restos-core; restos-portal keeps its zero-config SQLite
# (its Prisma schema is sqlite-provider — see DECISIONS.md). D1 streaming services
# (redpanda + producer + streamer) live in the `streaming` profile.

name: restos

services:
  # ---- data tier -------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-restos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restos}
      POSTGRES_DB: ${POSTGRES_DB:-restos}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restos} -d ${POSTGRES_DB:-restos}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---- application tier ------------------------------------------------------
  restos-core:
    build:
      context: ../../restos-core
    image: restos-core:local
    environment:
      SPRING_PROFILES_ACTIVE: postgres
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-restos}
      POSTGRES_USER: ${POSTGRES_USER:-restos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restos}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  restos-portal:
    build:
      context: ../../restos-portal
    image: restos-portal:local
    environment:
      PORT: "3000"
      DATABASE_URL: "file:/app/data/dev.db"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL: "15m"
      JWT_REFRESH_TTL: "7d"
      POINTS_PER_PLN: "1"
    ports:
      - "3000:3000"
    volumes:
      - portal-data:/app/data
    restart: unless-stopped

  # ---- presentation tier (static bundles behind nginx) -----------------------
  restos-web:
    build:
      context: ../../restos-web
    image: restos-web:local
    ports:
      - "8081:80"
    depends_on:
      - restos-core
    restart: unless-stopped

  restos-courier:
    build:
      context: ../../restos-courier
    image: restos-courier:local
    profiles: ["courier"]      # heavier Flutter build — opt in with --profile courier
    ports:
      - "8082:80"
    restart: unless-stopped

  # ---- streaming tier (D1) ---------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.2.7
    command:
      - redpanda
      - start
      - --smp=1
      - --overprovisioned
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"   # external Kafka listener (host tools)
      - "9644:9644"     # admin API + Prometheus metrics
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  restos-data-streamer:
    build:
      context: ../../restos-data
    image: restos-data-streaming:local
    command: ["consume", "--batch-size", "50"]
    environment:
      REDPANDA_BOOTSTRAP: redpanda:9092
    volumes:
      - delta-data:/app/data
    depends_on:
      redpanda:
        condition: service_healthy
    restart: unless-stopped

  restos-data-producer:
    build:
      context: ../../restos-data
    image: restos-data-streaming:local
    command: ["produce", "--limit", "800"]
    environment:
      REDPANDA_BOOTSTRAP: redpanda:9092
    depends_on:
      redpanda:
        condition: service_healthy
    restart: "no"        # one-shot burst; exits 0 when done

  # ---- observability spine ---------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (ready for app traces)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (re-exported app metrics)
    depends_on:
      - restos-core
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus-full.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  portal-data:
  grafana-data:
  delta-data:
