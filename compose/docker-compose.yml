# Observability + database stack for RestOS. Runs with only public images — no custom builds:
#   docker compose -f compose/docker-compose.yml up
# Point restos-core / restos-portal at this Postgres and expose their metrics for Prometheus.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: restos
      POSTGRES_PASSWORD: restos
      POSTGRES_DB: restos
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restos"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports: ["3000:3000"]
    depends_on: [prometheus]
