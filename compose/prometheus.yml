global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  # restos-core (Spring Boot Actuator) — run the API on :8080, Prometheus scrapes its metrics.
  - job_name: restos-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
  # restos-portal (NestJS) — expose a /metrics endpoint (v2) for this job.
  - job_name: restos-portal
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3001"]
