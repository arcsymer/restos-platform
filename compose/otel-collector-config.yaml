# OpenTelemetry Collector as a real metrics gateway in the RestOS stack.
# It scrapes restos-core's Prometheus endpoint, batches, and re-exports on :8889
# for Prometheus to scrape — so the pipeline is: core -> otel-collector -> prometheus.
# The OTLP receivers are live and ready for application traces/metrics push.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: core-via-collector
          scrape_interval: 15s
          metrics_path: /actuator/prometheus
          static_configs:
            - targets: ["restos-core:8080"]

processors:
  batch: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [prometheus, debug]
